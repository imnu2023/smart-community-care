<style>
        body {
            background-color: theme('colors.background');
            color: theme('colors.on-background');
        }
        
        .pulse-critical {
            animation: pulse-ring 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes pulse-ring {
            0% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(186, 26, 26, 0.7);
            }
            70% {
                transform: scale(1);
                box-shadow: 0 0 0 40px rgba(186, 26, 26, 0);
            }
            100% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(186, 26, 26, 0);
            }
        }

        .pulse-bg {
            animation: pulse-bg 4s ease-in-out infinite alternate;
        }

        @keyframes pulse-bg {
            0% { background-color: theme('colors.surface-pure'); }
            100% { background-color: theme('colors.critical-container'); }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-gutter md:p-margin-desktop bg-surface-pure transition-colors duration-1000 pulse-bg relative overflow-hidden">
<!-- Top nav area placeholder for closing action if needed, though this is a full screen task flow -->
<div class="absolute top-0 left-0 w-full p-gutter flex justify-between items-center z-10">
<button class="w-12 h-12 rounded-full bg-surface-pure/80 backdrop-blur-sm border border-border-cloud flex items-center justify-center text-text-steel hover:bg-surface-whisper transition-all duration-200 active:translate-y-px shadow-sm">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">close</span>
</button>

</div>
<!-- Main Content Area -->
<main class="w-full max-w-2xl flex flex-col items-center justify-center gap-12 relative z-10">
<!-- Header Text -->
<div class="text-center space-y-2">
<h1 class="font-display text-display text-on-surface font-bold">紧急救援</h1>
<p class="font-body-lg text-body-lg text-text-steel">如果您需要帮助，请长按下方按钮</p>
</div>
<!-- Huge SOS Button -->
<div class="relative flex items-center justify-center w-64 h-64 md:w-80 md:h-80 my-8">
<!-- Ripple layers -->
<div class="absolute inset-0 rounded-full bg-critical opacity-20 pulse-critical"></div>
<div class="absolute inset-4 rounded-full bg-critical opacity-40 pulse-critical" style="animation-delay: 0.5s;"></div>
<!-- Button Core -->
<button class="relative w-48 h-48 md:w-56 md:h-56 bg-critical rounded-full shadow-[0_10px_40px_rgba(186,26,26,0.5)] flex flex-col items-center justify-center text-on-error hover:scale-105 transition-transform duration-300 active:scale-95 active:shadow-[0_5px_20px_rgba(186,26,26,0.6)] group border-4 border-surface-pure">
<span class="material-symbols-outlined text-6xl md:text-7xl mb-2 group-hover:scale-110 transition-transform duration-300" style="font-variation-settings: 'FILL' 1;">emergency</span>
<span class="font-headline-lg text-headline-lg font-bold tracking-wider">SOS</span>
<span class="font-label-md text-label-md mt-1 opacity-90">一键呼叫</span>
</button>
</div><div class="grid grid-cols-3 gap-4 w-full max-w-md mb-4">
<button class="flex flex-col items-center gap-2 group">
<div class="w-16 h-16 rounded-full bg-success-container flex items-center justify-center text-success shadow-sm hover:shadow-md transition-all duration-200 active:scale-95">
<span class="material-symbols-outlined text-3xl">medical_services</span>
</div>
<span class="font-label-md text-label-md text-on-surface">医疗</span>
</button>
<button class="flex flex-col items-center gap-2 group">
<div class="w-16 h-16 rounded-full bg-critical-container flex items-center justify-center text-critical shadow-sm hover:shadow-md transition-all duration-200 active:scale-95">
<span class="material-symbols-outlined text-3xl">local_fire_department</span>
</div>
<span class="font-label-md text-label-md text-on-surface">火灾</span>
</button>
<button class="flex flex-col items-center gap-2 group">
<div class="w-16 h-16 rounded-full bg-warning-container flex items-center justify-center text-warning shadow-sm hover:shadow-md transition-all duration-200 active:scale-95">
<span class="material-symbols-outlined text-3xl">shield</span>
</div>
<span class="font-label-md text-label-md text-on-surface">安全</span>
</button>
</div>
<!-- Secondary Actions Grid -->

</main>
<!-- Subtle Background Elements for depth -->
<div class="fixed top-[-20%] left-[-10%] w-[50vw] h-[50vw] rounded-full bg-critical-container opacity-20 blur-3xl -z-10 pointer-events-none"></div>
<div class="fixed bottom-[-10%] right-[-10%] w-[40vw] h-[40vw] rounded-full bg-warning-container opacity-20 blur-3xl -z-10 pointer-events-none"></div>
