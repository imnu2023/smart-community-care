server:
  port: 8081

spring:
  application:
    name: smart-community-care
  
  datasource:
    url: jdbc:mysql://localhost:3306/smart_community?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 6000ms
      lettuce:
        shutdown-timeout: 100ms
      client-type: lettuce
      connect-timeout: 1000ms
      enable: false
  
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  
  sql:
    init:
      mode: never

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

jwt:
  secret: smart-community-care-jwt-secret-key-2024
  expire: 86400000

mqtt:
  broker: tcp://localhost:1883
  client-id: smart-community-service
  username: admin
  password: password
  topic-prefix: smart/community/